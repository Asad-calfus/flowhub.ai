services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: flowhub
      POSTGRES_PASSWORD: flowhub
      POSTGRES_DB: flowhub
    ports:
      - "5433:5432"
    volumes:
      - flowhub_pgdata:/var/lib/postgresql/data
      - ./backend/scripts/db/init_pgvector.sql:/docker-entrypoint-initdb.d/init_pgvector.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowhub -d flowhub"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://flowhub:flowhub@db:5432/flowhub
      CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      # Resolved by the browser, not by this container - must be a host-reachable URL.
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8001/api/v1"
      # Used only by app/api/evaluation/route.ts (server-side, read-only).
      BACKEND_RESULTS_DIR: "/backend-results"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./backend/results:/backend-results:ro

volumes:
  flowhub_pgdata:
